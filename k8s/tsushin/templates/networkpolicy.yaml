{{- if .Values.networkPolicy.enabled }}
# Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tsushin.fullname" . }}-default-deny
  namespace: {{ include "tsushin.namespace" . }}
  labels:
    {{- include "tsushin.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow frontend to receive traffic from Ingress / LB and reach backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tsushin.fullname" . }}-frontend
  namespace: {{ include "tsushin.namespace" . }}
  labels:
    {{- include "tsushin.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tsushin.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from GKE Ingress controller (any source — LB health checks + user traffic)
    - ports:
        - port: {{ .Values.frontend.port }}
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow frontend → backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "tsushin.backend.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
---
# Allow backend to receive traffic from frontend / Ingress and reach Cloud SQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tsushin.fullname" . }}-backend
  namespace: {{ include "tsushin.namespace" . }}
  labels:
    {{- include "tsushin.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tsushin.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from GKE Ingress controller and frontend pods
    - ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow backend → Cloud SQL (via sidecar on localhost, but also allow external for IAM auth metadata)
    - ports:
        - port: {{ .Values.cloudsql.port }}
          protocol: TCP
    # Allow HTTPS egress for AI provider APIs, Google metadata server, Secret Manager, etc.
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
{{- end }}
