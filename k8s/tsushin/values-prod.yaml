# =============================================================================
# Tsushin Helm Chart — Prod Environment Overrides
# =============================================================================

backend:
  replicas: 2
  env:
    TSN_LOG_LEVEL: "WARNING"
    TSN_LOG_FORMAT: "json"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "3Gi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

frontend:
  replicas: 2
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

persistence:
  data:
    size: "50Gi"
    storageClass: "premium-rwo"

networkPolicy:
  enabled: true
