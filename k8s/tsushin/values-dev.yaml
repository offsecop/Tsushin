# =============================================================================
# Tsushin Helm Chart — Dev Environment Overrides
# =============================================================================

backend:
  replicas: 1
  env:
    TSN_LOG_LEVEL: "DEBUG"
    TSN_LOG_FORMAT: "text"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  hpa:
    enabled: false

frontend:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  hpa:
    enabled: false

persistence:
  data:
    size: "10Gi"
    storageClass: "standard-rwo"

networkPolicy:
  enabled: false
