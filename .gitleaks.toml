# .gitleaks.toml
# Custom gitleaks configuration for Tsushin
# Extends default rules with project-specific patterns

title = "Tsushin Secret Detection Rules"

[extend]
# Use default gitleaks rules as base
useDefault = true

# ============================================
# Tsushin-specific rules
# ============================================

[[rules]]
id = "tsushin-jwt-secret"
description = "Tsushin JWT Secret Key"
regex = '''JWT_SECRET_KEY\s*=\s*['"]?([a-zA-Z0-9_-]{32,})['"]?'''
secretGroup = 1
keywords = ["jwt_secret"]

[[rules]]
id = "tsushin-asana-encryption"
description = "Asana Fernet Encryption Key"
regex = '''ASANA_ENCRYPTION_KEY\s*=\s*['"]?([A-Za-z0-9+/=]{44})['"]?'''
secretGroup = 1
keywords = ["asana_encryption", "fernet"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[a-zA-Z0-9_-]{95,}'''
keywords = ["anthropic", "claude"]

[[rules]]
id = "openai-api-key-custom"
description = "OpenAI API Key"
regex = '''sk-[a-zA-Z0-9]{48,}'''
keywords = ["openai"]

[[rules]]
id = "google-gemini-api-key"
description = "Google/Gemini API Key"
regex = '''AIza[a-zA-Z0-9_-]{35}'''
keywords = ["google", "gemini"]

[[rules]]
id = "brave-search-api-key"
description = "Brave Search API Key"
regex = '''BSA[a-zA-Z0-9]{32,}'''
keywords = ["brave"]

[[rules]]
id = "amadeus-credentials"
description = "Amadeus API Credentials"
regex = '''AMADEUS_API_(KEY|SECRET)\s*=\s*['"]?([a-zA-Z0-9]{20,})['"]?'''
secretGroup = 2
keywords = ["amadeus"]

[[rules]]
id = "openrouter-api-key"
description = "OpenRouter API Key"
regex = '''sk-or-[a-zA-Z0-9_-]{40,}'''
keywords = ["openrouter"]

[[rules]]
id = "vertex-ai-service-account-email"
description = "Vertex AI / GCP Service Account Email"
regex = '''[a-zA-Z0-9._-]+@[a-zA-Z0-9_-]+\.iam\.gserviceaccount\.com'''
keywords = ["gserviceaccount", "iam"]

[[rules]]
id = "vertex-ai-private-key"
description = "Vertex AI / GCP Private Key (PEM)"
regex = '''-----BEGIN (RSA |EC |)PRIVATE KEY-----'''
keywords = ["private_key"]

[[rules]]
id = "vertex-ai-project-id"
description = "Vertex AI / GCP hardcoded project ID in env assignment"
regex = '''VERTEX_AI_PROJECT_ID\s*=\s*['"]([a-z][a-z0-9-]{4,28}[a-z0-9])['"]'''
secretGroup = 1
keywords = ["VERTEX_AI_PROJECT_ID"]

[[rules]]
id = "vertex-ai-credentials-json"
description = "Vertex AI / GCP service account credentials JSON (inline)"
regex = '''"type"\s*:\s*"service_account"'''
keywords = ["service_account"]

# ============================================
# Allowlist - files/patterns that should be ignored
# ============================================

[allowlist]
description = "Allowlisted files and patterns"

paths = [
    # Example/template files with placeholders
    '''\.env\.example$''',
    '''env\.example$''',
    '''\.env\.template$''',

    # Documentation
    '''README\.md$''',
    '''CLAUDE\.md$''',
    '''ARCHITECTURE\.md$''',
    '''DOCUMENTATION\.md$''',
    '''USER_GUIDE\.md$''',
    '''docs/.*\.md$''',

    # Node modules and virtual environments
    '''frontend/node_modules/.*''',
    '''backend/venv/.*''',
    '''node_modules/.*''',
    '''\.venv/.*''',

    # Test files (may contain mock keys)
    '''.*test.*\.py$''',
    '''.*_test\.py$''',
    '''.*\.test\.(ts|tsx|js|jsx)$''',
    '''.*\.spec\.(ts|tsx|js|jsx)$''',
    '''backend/tests/.*''',
    '''frontend/__tests__/.*''',

    # Lock files
    '''.*-lock\.json$''',
    '''.*\.lock$''',
    '''poetry\.lock$''',

    # Private folder (already gitignored, but extra safety)
    '''\.private/.*''',

    # Build outputs
    '''\.next/.*''',
    '''dist/.*''',
    '''build/.*''',
    '''__pycache__/.*''',
]

# Patterns that are allowed (placeholders, examples)
regexes = [
    # Common placeholder patterns
    '''your[-_].*[-_]key.*''',
    '''change[-_]this[-_]in[-_]production''',
    '''test[-_]?key''',
    '''fake[-_]?key''',
    '''example[-_]?key''',
    '''dummy[-_]?key''',
    '''sample[-_]?key''',
    '''xxx+''',
    '''placeholder''',
    '''CHANGEME''',
    '''INSERT[-_]?YOUR[-_]?.*[-_]?HERE''',

    # Environment variable references (not actual values)
    '''\$\{[A-Z_]+\}''',
    '''\$[A-Z_]+''',
    '''process\.env\.[A-Z_]+''',
    '''os\.environ\.get\(['"][A-Z_]+['"]\)''',
    '''os\.getenv\(['"][A-Z_]+['"]\)''',

    # Empty values after = (allowed in .env.example)
    '''=\s*$''',
    '''=\s*#.*$''',

    # Common test/mock patterns
    '''test[-_]?123''',
    '''mock[-_]?.*[-_]?key''',
    '''12345+''',

    # Vertex AI / GCP placeholder patterns (infrastructure templates)
    '''@PROJECT\.iam\.gserviceaccount\.com''',
    '''\$\{\{.*secrets\.GCP_PROJECT''',
]

# Specific commits to allow (add commit hashes here if needed)
# commits = []

# Specific stopwords to ignore
stopwords = [
    "example",
    "sample",
    "test",
    "fake",
    "mock",
    "dummy",
    "placeholder",
]
