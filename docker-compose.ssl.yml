# ============================================================================
# Tsushin SSL/HTTPS Override
# Overlays TLS termination + public port publishing on top of the base
# Caddy `proxy` service defined in `docker-compose.yml`.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ssl.yml up -d --build
#
# Requires SSL_MODE, SSL_DOMAIN set in .env and a generated
# caddy/${TSN_STACK_NAME}/Caddyfile with matching cert assets.
# ============================================================================

services:
  # ==========================================================================
  # Caddy Reverse Proxy — SSL Termination
  # Replaces the base service's HTTP-only Caddyfile with the stack-scoped
  # TLS-enabled one, opens 80/443 externally, and mounts cert/state volumes.
  # ==========================================================================
  proxy:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes: !override
      - ./caddy/${TSN_STACK_NAME:-tsushin}/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/${TSN_STACK_NAME:-tsushin}/certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy-data:
    name: ${TSN_STACK_NAME:-tsushin}-caddy-data
  caddy-config:
    name: ${TSN_STACK_NAME:-tsushin}-caddy-config
